name: Update fuel prices

on:
  schedule:
    # runs every day at 07:00 UTC (10:00 Romania time)
    - cron: "0 7 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python scrape_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name "fuel-bot"
          git config user.email "fuel-bot@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "prices: auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
